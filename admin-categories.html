<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Categories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="admin-page" data-view="categories">
  <header class="topbar">
    <a class="brand" href="./index.html"><span class="brand-mark" aria-hidden="true"><img src="./company-logo.png" alt="" /></span><span class="brand-copy"><strong>CHENNAI EASTGATE</strong><span>Trading Private Limited | Admin</span></span></a>
    <nav class="admin-toplinks">
      <a href="./admin.html">Dashboard</a><a href="./admin-products.html">Products</a><a href="./admin-categories.html">Categories</a><a href="./admin-orders.html">Orders</a><a href="./admin-customers.html">Customers</a><a href="./index.html">Storefront</a><a href="./admin-login.html" data-action="logout">Logout</a>
    </nav>
  </header>
  <main class="page admin-page">
    <section class="admin-controls">
      <div class="panel-card">
        <div class="section-heading compact"><p class="eyebrow">Category manager</p><h2>Add or edit product categories</h2></div>
        <form id="categoryForm" class="stack">
          <label><span>Category</span><select id="categorySelect"></select></label>
          <label><span>Category name</span><input type="text" id="categoryName" /></label>
          <label><span>Description</span><textarea id="categoryDescription" rows="3"></textarea></label>
          <div class="form-grid">
            <label><span>Sort order</span><input type="number" id="categorySortOrder" min="1" step="1" value="1" /></label>
            <label class="checkbox-inline"><input type="checkbox" id="categoryActive" checked /><span>Active</span></label>
          </div>
          <div class="dialog-actions">
            <button class="btn btn-primary" type="submit">Save category</button>
            <button class="btn btn-secondary" type="button" id="deleteCategoryButton">Delete</button>
          </div>
        </form>
      </div>
      <div class="panel-card">
        <div class="section-heading compact"><p class="eyebrow">Categories</p><h3>Master setup</h3></div>
        <div class="table-list" id="categoriesTable"></div>
      </div>
    </section>
  </main>
  <script src="./shared.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
