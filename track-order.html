<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Track Order - Chennai Eastgate</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <button class="hamburger" id="hamburgerButton" aria-label="Open menu" aria-expanded="false">☰</button>
    <a class="brand" href="./index.html">
      <span class="brand-mark"><img src="./company-logo.png" alt=""/></span>
      <span class="brand-copy"><strong>CHENNAI EASTGATE</strong><span>Track Order</span></span>

  <nav class="mobile-menu" id="mobileMenu" aria-hidden="true">

      <form class="stack">

        <label><span>Email or phone</span><input type="text" placeholder="customer@example.com" /></label>
        <button class="btn btn-primary" type="submit">Lookup</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>Return to <a href="./index.html">storefront</a>.</p>
