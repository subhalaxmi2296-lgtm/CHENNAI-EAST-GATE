<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="admin-page" data-view="products">
  <header class="topbar">
    <a class="brand" href="./index.html">
      <span class="brand-mark" aria-hidden="true"><img src="./company-logo.png" alt="" /></span>
      <span class="brand-copy"><strong>CHENNAI EASTGATE</strong><span>Trading Private Limited | Admin</span></span>
    </a>
    <nav class="admin-toplinks">
      <a href="./admin.html">Dashboard</a><a href="./admin-products.html">Products</a><a href="./admin-categories.html">Categories</a><a href="./admin-orders.html">Orders</a><a href="./admin-customers.html">Customers</a><a href="./index.html">Storefront</a><a href="./admin-login.html" data-action="logout">Logout</a>
    </nav>
  </header>
  <main class="page admin-page">
    <section class="section-heading">
      <p class="eyebrow">Product manager</p>
      <h2>Add or edit products</h2>
    </section>
    <section class="admin-controls">
      <div class="panel-card">
        <form id="productForm" class="stack">
          <label><span>Product</span><select id="productSelect"></select></label>
          <div class="form-grid">
            <label><span>Name</span><input type="text" id="productName" /></label>
            <label><span>Brand</span><input type="text" id="productBrand" /></label>
          </div>
          <div class="form-grid">
            <label><span>Category</span><select id="productCategory"></select></label>
            <label><span>Subcategory</span><input type="text" id="productSubcategory" /></label>
          </div>
          <div class="form-grid">
            <label><span>Price</span><input type="number" id="productPrice" min="0" step="1" /></label>
            <label><span>Stock</span><input type="number" id="productStock" min="0" step="1" /></label>
          </div>
          <div class="form-grid">
            <label><span>Badge</span><input type="text" id="productBadge" /></label>
            <label><span>Image URL</span><input type="url" id="productImageUrl" /></label>
          </div>
          <label><span>Or upload image</span><input type="file" id="productImageFile" accept="image/*" /></label>
          <label><span>Description</span><textarea id="productDescription" rows="3"></textarea></label>
          <label><span>Specifications</span><textarea id="productSpecs" rows="3"></textarea></label>
          <div class="form-grid">
            <label class="checkbox-inline"><input type="checkbox" id="productActive" checked /><span>Active</span></label>
            <label class="checkbox-inline"><input type="checkbox" id="productFeatured" checked /><span>Featured</span></label>
          </div>
          <div class="dialog-actions">
            <button class="btn btn-primary" type="submit">Save product</button>
            <button class="btn btn-secondary" type="button" id="deleteProductButton">Delete</button>
          </div>
        </form>
      </div>
      <div class="panel-card">
        <div class="section-heading compact"><p class="eyebrow">Inventory</p><h3>Catalog overview</h3></div>
        <div class="table-list" id="inventoryTable"></div>
      </div>
    </section>
  </main>
  <script src="./shared.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
